AWSTemplateFormatVersion: '2010-09-09'
Description: 'Terraform Foundation - Shared backend resources for Terraform/OpenTofu state management'

Parameters:
  CloudTrailEnabled:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: 'Enable CloudTrail logging for account events'

  Project:
    Type: String
    Description: 'Project name from git remote'

  Repository:
    Type: String
    Description: 'Full repository URL'

  Environment:
    Type: String
    Description: 'Environment name (e.g., Production, Development)'

  Owner:
    Type: String
    Description: 'Resource owner'

  DeployedBy:
    Type: String
    Description: 'IAM principal that deployed the stack'

  ManagedBy:
    Type: String
    Default: 'CloudFormation'
    Description: 'Management tool'

  DeploymentID:
    Type: String
    Description: 'Deployment identifier'

  OidcProvider:
    Type: String
    Description: 'OIDC provider type (github, gitlab, bitbucket)'

  OidcUrl:
    Type: String
    Description: 'OIDC provider URL'

  OidcThumbprints:
    Type: CommaDelimitedList
    Description: 'OIDC provider thumbprints (comma-separated)'

  OidcAudience:
    Type: String
    Description: 'OIDC provider audience'

Conditions:
  EnableCloudTrail: !Equals [!Ref CloudTrailEnabled, 'true']

Resources:
  # S3 Bucket for CloudTrail logs
  CloudTrailLogBucket:
    Type: AWS::S3::Bucket
    Condition: EnableCloudTrail
    Properties:
      BucketName: !Sub 'cloudtrail-logs-${AWS::AccountId}-${AWS::Region}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: IntelligentTiering
            Status: Enabled
            Transitions:
              - TransitionInDays: 0
                StorageClass: INTELLIGENT_TIERING
          - Id: ExpireLogs
            Status: Enabled
            ExpirationInDays: 90
      Tags:
        - Key: Project
          Value: !Ref Project
        - Key: Repository
          Value: !Ref Repository
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref Owner
        - Key: AccountId
          Value: !Ref AWS::AccountId
        - Key: Region
          Value: !Ref AWS::Region
        - Key: DeployedBy
          Value: !Ref DeployedBy
        - Key: ManagedBy
          Value: !Ref ManagedBy
        - Key: DeploymentID
          Value: !Ref DeploymentID
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

  # Bucket policy for CloudTrail
  CloudTrailLogBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Condition: EnableCloudTrail
    Properties:
      Bucket: !Ref CloudTrailLogBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AWSCloudTrailAclCheck
            Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: s3:GetBucketAcl
            Resource: !GetAtt CloudTrailLogBucket.Arn
          - Sid: AWSCloudTrailWrite
            Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub '${CloudTrailLogBucket.Arn}/*'
            Condition:
              StringEquals:
                s3:x-amz-acl: bucket-owner-full-control
                aws:SourceAccount: !Ref AWS::AccountId

  # CloudTrail for tracking management events (IAM/STS/etc)
  CloudTrail:
    Type: AWS::CloudTrail::Trail
    Condition: EnableCloudTrail
    DependsOn: CloudTrailLogBucketPolicy
    Properties:
      TrailName: !Sub 'terraform-foundation-${AWS::AccountId}'
      S3BucketName: !Ref CloudTrailLogBucket
      IncludeGlobalServiceEvents: true
      IsLogging: true
      IsMultiRegionTrail: true
      EventSelectors:
        - ReadWriteType: All
          IncludeManagementEvents: true
      Tags:
        - Key: Project
          Value: !Ref Project
        - Key: Repository
          Value: !Ref Repository
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref Owner
        - Key: AccountId
          Value: !Ref AWS::AccountId
        - Key: Region
          Value: !Ref AWS::Region
        - Key: DeployedBy
          Value: !Ref DeployedBy
        - Key: ManagedBy
          Value: !Ref ManagedBy
        - Key: DeploymentID
          Value: !Ref DeploymentID

  # S3 Bucket for access logs (must be created first)
  TerraformStateLogBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'terraform-state-logs-${AWS::AccountId}-${AWS::Region}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: ExpireLogs
            Status: Enabled
            ExpirationInDays: 90
      Tags:
        - Key: Project
          Value: !Ref Project
        - Key: Repository
          Value: !Ref Repository
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref Owner
        - Key: AccountId
          Value: !Ref AWS::AccountId
        - Key: Region
          Value: !Ref AWS::Region
        - Key: DeployedBy
          Value: !Ref DeployedBy
        - Key: ManagedBy
          Value: !Ref ManagedBy
        - Key: DeploymentID
          Value: !Ref DeploymentID
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

  # Bucket policy to allow S3 log delivery
  TerraformStateLogBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref TerraformStateLogBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: S3ServerAccessLogsPolicy
            Effect: Allow
            Principal:
              Service: logging.s3.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub '${TerraformStateLogBucket.Arn}/access-logs/*'
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId

  # S3 Bucket for Terraform state storage
  TerraformStateBucket:
    Type: AWS::S3::Bucket
    DependsOn: TerraformStateLogBucketPolicy
    Properties:
      BucketName: !Sub 'terraform-state-${AWS::AccountId}-${AWS::Region}'
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
            BucketKeyEnabled: true
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: IntelligentTiering
            Status: Enabled
            Transitions:
              - TransitionInDays: 0
                StorageClass: INTELLIGENT_TIERING
          - Id: BackupRetention
            Status: Enabled
            Prefix: 'backups/'
            Transitions:
              - TransitionInDays: 30
                StorageClass: INTELLIGENT_TIERING
            ExpirationInDays: 365
      LoggingConfiguration:
        DestinationBucketName: !Ref TerraformStateLogBucket
        LogFilePrefix: 'access-logs/'
      Tags:
        - Key: Project
          Value: !Ref Project
        - Key: Repository
          Value: !Ref Repository
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref Owner
        - Key: AccountId
          Value: !Ref AWS::AccountId
        - Key: Region
          Value: !Ref AWS::Region
        - Key: DeployedBy
          Value: !Ref DeployedBy
        - Key: ManagedBy
          Value: !Ref ManagedBy
        - Key: DeploymentID
          Value: !Ref DeploymentID
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

  # DynamoDB table for state locking
  TerraformLockTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'terraform-locks-${AWS::AccountId}-${AWS::Region}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: LockID
          AttributeType: S
      KeySchema:
        - AttributeName: LockID
          KeyType: HASH
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      DeletionProtectionEnabled: true
      Tags:
        - Key: Project
          Value: !Ref Project
        - Key: Repository
          Value: !Ref Repository
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref Owner
        - Key: AccountId
          Value: !Ref AWS::AccountId
        - Key: Region
          Value: !Ref AWS::Region
        - Key: DeployedBy
          Value: !Ref DeployedBy
        - Key: ManagedBy
          Value: !Ref ManagedBy
        - Key: DeploymentID
          Value: !Ref DeploymentID
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete

  # OIDC Provider (auto-detected from git remote: GitHub, GitLab, or Bitbucket)
  OidcProviderResource:
    Type: AWS::IAM::OIDCProvider
    Properties:
      Url: !Ref OidcUrl
      ClientIdList:
        - !Ref OidcAudience
      ThumbprintList: !Ref OidcThumbprints
      Tags:
        - Key: Project
          Value: !Ref Project
        - Key: Repository
          Value: !Ref Repository
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref Owner
        - Key: AccountId
          Value: !Ref AWS::AccountId
        - Key: Region
          Value: !Ref AWS::Region
        - Key: DeployedBy
          Value: !Ref DeployedBy
        - Key: ManagedBy
          Value: !Ref ManagedBy
        - Key: DeploymentID
          Value: !Ref DeploymentID
        - Key: OidcProvider
          Value: !Ref OidcProvider

  # Parameter Store entries for configuration distribution
  S3BucketParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /terraform/foundation/s3-state-bucket
      Type: String
      Value: !Ref TerraformStateBucket
      Description: 'S3 bucket name for Terraform state storage'
      Tags:
        Project: !Ref Project
        Repository: !Ref Repository
        Environment: !Ref Environment
        Owner: !Ref Owner
        ManagedBy: !Ref ManagedBy

  DynamoDBTableParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /terraform/foundation/dynamodb-lock-table
      Type: String
      Value: !Ref TerraformLockTable
      Description: 'DynamoDB table name for Terraform state locking'
      Tags:
        Project: !Ref Project
        Repository: !Ref Repository
        Environment: !Ref Environment
        Owner: !Ref Owner
        ManagedBy: !Ref ManagedBy

  OidcProviderParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /terraform/foundation/oidc-provider
      Type: String
      Value: !Ref OidcProviderResource
      Description: 'OIDC provider ARN for CI/CD authentication'
      Tags:
        Project: !Ref Project
        Repository: !Ref Repository
        Environment: !Ref Environment
        Owner: !Ref Owner
        ManagedBy: !Ref ManagedBy

Outputs:
  TerraformStateBucket:
    Description: 'S3 bucket for Terraform state storage'
    Value: !Ref TerraformStateBucket
    Export:
      Name: !Sub '${AWS::StackName}-StateBucket'

  TerraformLockTable:
    Description: 'DynamoDB table for Terraform state locking'
    Value: !Ref TerraformLockTable
    Export:
      Name: !Sub '${AWS::StackName}-LockTable'

  OidcProviderArn:
    Description: 'OIDC provider ARN for CI/CD authentication'
    Value: !Ref OidcProviderResource
    Export:
      Name: !Sub '${AWS::StackName}-OidcProvider'

  StackName:
    Description: 'CloudFormation stack name'
    Value: !Ref AWS::StackName
    Export:
      Name: !Sub '${AWS::StackName}-StackName'